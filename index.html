<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LynkPay Debugger</title>
    <script src="https://unpkg.com/@privy-io/js-sdk-core@latest/dist/index.umd.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #fafafa; }
        .status-box { padding: 20px; border-radius: 10px; background: white; border: 1px solid #ddd; display: inline-block; }
        .error { color: red; font-weight: bold; }
        .success { color: green; font-weight: bold; }
    </style>
</head>
<body>

    <div class="status-box">
        <h2>Privy Connection Status</h2>
        <div id="status">Checking credentials...</div>
        <br>
        <button id="btn" onclick="runDeposit()" style="padding:10px 20px;" disabled>Waiting for SDK...</button>
    </div>

    <script>
        const APP_ID = 'cmlwqj4ar01n20djx41hon6s9';
        const CLIENT_ID = 'client-WY6W4TBBpokBd6VYh1xRkaAYWBkGvJw6HdVeAr4cvHC9f';
        let privy;

        // 1. Force a check after 5 seconds
        setTimeout(() => {
            if (!privy) {
                document.getElementById('status').innerHTML = `
                    <p class="error">STUCK DETECTED!</p>
                    <p>Possible reasons:<br>
                    1. You didn't add <strong>${window.location.origin}</strong> to Privy Dashboard > Domains.<br>
                    2. You are opening this as a local file (file://). <strong>You MUST use a local server</strong> (like Live Server or http-server).</p>
                `;
            }
        }, 5000);

        window.onload = () => {
            try {
                // 2. Minimal Init
                privy = new Privy({
                    appId: APP_ID,
                    clientId: CLIENT_ID,
                    config: { supportedChains: [137] }
                });

                document.getElementById('status').innerHTML = '<span class="success">Connected to Privy ✅</span>';
                document.getElementById('btn').disabled = false;
                document.getElementById('btn').innerText = "Test 100 USDC Deposit";
            } catch (err) {
                document.getElementById('status').className = 'error';
                document.getElementById('status').innerText = "Init Error: " + err.message;
            }
        };

        async function runDeposit() {
            try {
                // 3. Test with a standard Polygon address
                await privy.fundWallet('0x742d35Cc6634C0532925a3b844Bc454e4438f44e', {
                    chain: 137,
                    asset: 'USDC',
                    amount: '100'
                });
            } catch (e) {
                alert("Funding Error: " + e.message);
            }
        }
    </script>
</body>
</html>
