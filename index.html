<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LynkPay Privy Test</title>
    <script src="https://unpkg.com/@privy-io/js-sdk-core@latest/dist/index.umd.js"></script>
    
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { background: #007AFF; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0056b3; }
        .status { margin-top: 1rem; color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>LynkPay Deposit Test</h2>
        <p>Target Wallet: <br><strong id="wallet-addr">0x742d35Cc6634C0532925a3b844Bc454e4438f44e</strong></p>
        
        <button onclick="startTestDeposit()">Buy USDC (Apple Pay/Card)</button>
        
        <div id="status" class="status">Privy is initializing...</div>
    </div>

    <script>
        // 3. Initialize Privy with your specific keys
        const appId = 'cmlwqj4ar01n20djx41hon6s9';
        const clientId = 'client-WY6W4TBBpokBd6VYh1xRkaAYWBkGvJw6HdVeAr4cvHC9f';

        const privy = new Privy({
            appId: appId,
            clientId: clientId,
            config: {
                supportedChains: [137], // Polygon
            }
        });

        document.getElementById('status').innerText = "Privy Ready ✅";

        async function startTestDeposit() {
            const statusDiv = document.getElementById('status');
            const targetAddress = document.getElementById('wallet-addr').innerText;

            statusDiv.innerText = "Opening Privy Modal...";

            try {
                // 4. Trigger the On-ramp Flow
                await privy.fundWallet(targetAddress, {
                    chain: 137,     // Polygon
                    asset: 'USDC',   // Ask for USDC
                    amount: '100'    // Default amount
                });

                statusDiv.innerText = "Modal Closed. Check wallet balance on PolygonScan.";
            } catch (error) {
                console.error("Privy Error:", error);
                statusDiv.innerText = "Error: " + error.message;
            }
        }
    </script>
</body>
</html>
